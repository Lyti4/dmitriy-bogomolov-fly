backend:
  name: git-gateway
  branch: main

media_folder: "public/images/portfolio"
public_folder: "/images/portfolio"

locale: "ru"

# Настройка для динамических путей (попробуем на уровне коллекции)
collections:
  - name: "portfolio-proven"
    label: "Интерьеры"
    folder: "src/data/portfolio"
    create: true
    slug: "{{slug}}"
    media_folder: "public/images/portfolio/proven"
    public_folder: "/images/portfolio/proven"
    filter: { field: "category", value: "proven" }
    fields: &portfolio_fields
      - name: "title"
        label: "Название проекта"
        widget: "string"
      - name: "category"
        label: "Категория"
        widget: "hidden"
        default: "proven"
      - name: "image"
        label: "Главное изображение"
        widget: "image"
      - name: "images"
        label: "Галерея изображений"
        widget: "list"
        required: false
        field:
          name: "image"
          label: "Изображение"
          widget: "image"
      - name: "description"
        label: "Описание"
        widget: "markdown"
      - name: "date"
        label: "Дата создания"
        widget: "datetime"
        default: ""
      - name: "featured"
        label: "Рекомендуемый"
        widget: "boolean"
        default: false

