backend:
  name: git-gateway
  branch: main
  commit_messages:
    create: "Создан {{collection}} «{{slug}}»"
    update: "Обновлён {{collection}} «{{slug}}»"
    delete: "Удалён {{collection}} «{{slug}}»"
    uploadMedia: "Загружено медиа «{{path}}»"
    deleteMedia: "Удалено медиа «{{path}}»"

media_folder: "/public/images/portfolio" # Основная папка для медиа
public_folder: "/images/portfolio"

locale: "ru"

collections:
  - name: "portfolio"
    label: "Портфолио"
    folder: "src/data/portfolio"
    create: true
    slug: "{{slug}}"
    preview_path: "/"
    media_folder: "/public/images/portfolio/{{category}}" # Динамическая папка по категории
    public_folder: "/images/portfolio/{{category}}"     # Путь для отображения
    fields:
      - name: "title"
        label: "Название проекта"
        widget: "string"
      - name: "category"
        label: "Категория"
        widget: "select"
        options:
          - label: "Интерьеры"
            value: "proven"
          - label: "Кухни"
            value: "kitchens"
          - label: "Гардеробные"
            value: "cabinets"
          - label: "Шкафы"
            value: "wardrobes"
          - label: "Детская мебель"
            value: "children"
          - label: "Тумбы/столы"
            value: "shelves"
          - label: "Мебель для ванных"
            value: "bathroom"
          - label: "Элементы хранения"
            value: "storage"
      - name: "image"
        label: "Главное изображение"
        widget: "image"
      - name: "images"
        label: "Галерея изображений"
        widget: "list"
        required: false
        field:
          name: "image"
          label: "Изображение"
          widget: "image"
      - name: "description"
        label: "Описание"
        widget: "markdown"
      - name: "date"
        label: "Дата создания"
        widget: "datetime"
        default: ""
      - name: "featured"
        label: "Рекомендуемый"
        widget: "boolean"
        default: false
