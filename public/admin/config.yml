backend:
  name: github
  repo: Lyti4/dmitriy-bogomolov-fly # Замените на ваш репозиторий
  branch: main # или master, или другая основная ветка

media_folder: "public/images/portfolio" # Куда загружать медиафайлы
public_folder: "/images/portfolio" # Публичный путь к медиафайлам

# Добавляем предварительный просмотр для медиафайлов
media_library:
  max_file_size: 5000000 # 5MB
  folder_support: true

# Локализация интерфейса на русский
locale: 'ru'

collections:
  - name: "portfolio" # Название коллекции
    label: "Портфолио" # Метка для отображения в CMS
    folder: "src/data/portfolio" # Папка, где будут храниться файлы коллекции
    create: true # Разрешить создание новых элементов
    slug: "{{category}}-{{slug}}" # Шаблон для имени файла
    summary: "{{title}} ({{category}})" # Формат отображения в списке
    sortable_fields: ['title', 'category', 'commit_date'] # Поля для сортировки
    view_filters:
      - label: "Кухни"
        field: category
        pattern: "kitchens"
      - label: "Шкафы"
        field: category
        pattern: "cabinets"
      - label: "Тумбы/столы"
        field: category
        pattern: "shelves"
      - label: "Ванные"
        field: category
        pattern: "bathroom"
      - label: "Проверено в быту"
        field: category
        pattern: "proven"
    fields:
      - label: "Заголовок"
        name: "title"
        widget: "string"
        hint: "Например: Современная кухня с островом"
      - label: "Описание"
        name: "description"
        widget: "markdown"
        required: false
        hint: "Подробное описание проекта, особенности, материалы и т.д."
      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - {label: "Проверено в быту", value: "proven"}
          - {label: "Кухни", value: "kitchens"}
          - {label: "Шкафы", value: "cabinets"}
          - {label: "Тумбы/столы", value: "shelves"}
          - {label: "Мебель для ванных", value: "bathroom"}
        required: true
        hint: "Выберите категорию мебели для правильной группировки в портфолио"
      - label: "Главное изображение"
        name: "image"
        widget: "image"
        required: false
        hint: "Это изображение будет использоваться как превью, если не указаны другие изображения"
        choose_url: true
        media_folder: "/public/images/portfolio/{{category}}"
      - label: "Галерея изображений"
        name: "images"
        widget: "list"
        summary: "{{fields.image}}"
        field:
          label: "Изображение"
          name: "image"
          widget: "image"
          media_folder: "/public/images/portfolio/{{category}}"
        hint: "Добавьте одно или несколько изображений для слайдера"
      - label: "ID проекта"
        name: "id"
        widget: "string"
        required: false
        hint: "Уникальный идентификатор проекта (генерируется автоматически, если не указан)"
      - label: "Дата создания"
        name: "date"
        widget: "datetime"
        required: false
        hint: "Дата создания проекта"
      - label: "Особые отметки"
        name: "featured"
        widget: "boolean"
        required: false
        default: false
        hint: "Отметьте, если это особый проект, который нужно выделить"
